<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FeedmobAI 报销系统</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(180deg,#f0fdfa 0%,#ecfdf5 100%);min-height:100vh;color:#115e59}
.container{max-width:1040px;margin:0 auto;padding:20px 28px}
.nav{display:flex;align-items:center;justify-content:space-between;padding:16px 0;margin-bottom:24px}
.nav-left{display:flex;align-items:center;gap:12px}
.nav-left h1{font-size:18px;font-weight:800;color:#0f766e;letter-spacing:-0.5px}
.nav-right{display:flex;align-items:center;gap:12px;font-size:13px;color:#5eead4}
.nav-docs{color:#0d9488;text-decoration:none;font-weight:600;font-size:13px;transition:color .15s}
.nav-docs:hover{color:#0f766e}
header{display:flex;justify-content:space-between;align-items:center;padding:16px 0;margin-bottom:24px}
header h1{font-size:20px;font-weight:800;color:#0f766e;letter-spacing:-0.5px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;text-decoration:none}
.btn-primary{background:linear-gradient(135deg,#0d9488,#059669);color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(13,148,136,.3)}
.btn-danger{background:linear-gradient(135deg,#e11d48,#be123c);color:#fff}
.btn-danger:hover{opacity:.9}
.btn-success{background:linear-gradient(135deg,#059669,#047857);color:#fff}
.btn-success:hover{opacity:.9}
.btn-ghost{background:#fff;color:#115e59;border:1px solid #ccfbf1}
.btn-ghost:hover{background:#f0fdfa;border-color:#5eead4}
.btn-sm{padding:5px 12px;font-size:12px}
.card{background:#fff;border:1px solid #ccfbf1;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(15,118,110,.04)}
.card h2{font-size:16px;margin-bottom:14px;color:#0f766e;font-weight:700}
input,select,textarea{background:#fff;border:1px solid #ccfbf1;border-radius:8px;padding:9px 12px;color:#115e59;font-size:14px;width:100%;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:#14b8a6;box-shadow:0 0 0 3px rgba(20,184,166,.1)}
label{display:block;font-size:13px;color:#0f766e;font-weight:600;margin-bottom:4px;margin-top:12px}
.grid{display:grid;gap:16px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-4{grid-template-columns:repeat(4,1fr)}
.stat{text-align:center;padding:16px 12px;background:#f0fdfa;border-radius:10px}
.stat .num{font-size:26px;font-weight:800;color:#0f766e}
.stat .label{font-size:12px;color:#5eead4;margin-top:4px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:10px 8px;border-bottom:1px solid #e6fffa}
th{color:#5eead4;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.5px}
tr:hover{background:#f0fdfa}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.badge-pending{background:#fef3c7;color:#92400e}
.badge-approved{background:#d1fae5;color:#065f46}
.badge-rejected{background:#fee2e2;color:#991b1b}
.badge-agent{background:#e0e7ff;color:#3730a3}
.badge-forex{background:#ede9fe;color:#6d28d9;margin-left:4px}
.badge-exceed{background:#fee2e2;color:#991b1b;margin-left:4px}
.exceed-row{background:#fff1f2}
.token-box{display:flex;align-items:center;gap:8px;background:#f0fdfa;padding:10px 14px;border-radius:8px;border:1px solid #ccfbf1;font-family:monospace;font-size:13px;word-break:break-all;color:#115e59}
.tabs{display:flex;gap:4px;margin-bottom:20px}
.tab{padding:8px 18px;cursor:pointer;color:#5eead4;font-size:14px;font-weight:600;border-radius:8px;transition:all .15s}
.tab.active{color:#0f766e;background:#fff;box-shadow:0 1px 3px rgba(15,118,110,.08)}
.tab:hover{color:#0f766e}
.hidden{display:none!important}
.ocr-result{background:#f0fdfa;border:1px solid #ccfbf1;border-radius:8px;padding:12px;margin-top:12px;font-size:13px}
.ocr-result .field{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px dashed #ccfbf1}
.ocr-result .field:last-child{border:none}
.error-msg{color:#e11d48;font-size:13px;margin-top:8px}
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:16px}
.login-screen .logo{font-size:56px}
.login-screen h1{font-size:40px;color:#0f766e;font-weight:800;letter-spacing:-1px}
.login-nav{display:flex;justify-content:flex-end;width:100%;max-width:1040px;padding:20px 28px;position:absolute;top:0;left:50%;transform:translateX(-50%)}
.login-btn{background:linear-gradient(135deg,#0d9488,#059669);color:#fff;padding:10px 28px;border-radius:8px;font-size:13px;font-weight:700;text-decoration:none;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(13,148,136,.35)}
@media(max-width:640px){.grid-2,.grid-4{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container" id="app"></div>

<script>
const _path = location.pathname.replace(/\/+$/, '');
const BASE = _path.includes('/') && _path !== '/' ? location.origin + '/' + _path.split('/')[1] : location.origin;
const app=document.getElementById('app');

let currentUser=null;
let currentTab='dashboard';

async function api(path,opts={}){
  const r=await fetch(`${BASE}${path}`,{...opts,headers:{'Content-Type':'application/json',...opts.headers}});
  return r.json();
}
async function apiUpload(path,formData){
  const r=await fetch(`${BASE}${path}`,{method:'POST',body:formData});
  return r.json();
}

async function checkAuth(){
  const r=await api('/auth/me');
  if(r.success&&r.data){currentUser=r.data;return true;}
  currentUser=null;return false;
}

function showLogin(){
  app.innerHTML=`
  <div class="login-nav">
    <a href="${BASE}/auth/google" class="login-btn">Google 登录</a>
  </div>
  <div class="login-screen">
    <div class="logo">🧾</div>
    <h1>FeedmobAI 报销系统</h1>
    <p style="color:#5eead4;font-size:14px">仅限 @feedmob.com 邮箱登录</p>
  </div>`;
}

function renderLayout(){
  app.innerHTML=`
  <nav class="nav">
    <div class="nav-left">
      <h1>🧾 FeedmobAI 报销</h1>
      <a href="${BASE}/docs" target="_blank" class="nav-docs">用户文档</a>
    </div>
    <div class="nav-right">
      <span>${currentUser.email}</span>
      <a href="${BASE}/auth/logout" class="btn btn-ghost btn-sm">退出</a>
    </div>
  </nav>
  <div class="tabs" id="tabs">
    <div class="tab" data-tab="dashboard">📊 仪表盘</div>
    <div class="tab" data-tab="submit">📝 提交报销</div>
    <div class="tab" data-tab="list">📋 报销列表</div>
    <div class="tab" data-tab="token">🔑 Token</div>
  </div>
  <div id="content"></div>`;

  document.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click',()=>{currentTab=t.dataset.tab;renderTab()});
    if(t.dataset.tab===currentTab)t.classList.add('active');
  });
  renderTab();
}

async function renderTab(){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===currentTab));
  const c=document.getElementById('content');
  switch(currentTab){
    case 'dashboard': await renderDashboard(c); break;
    case 'submit': renderSubmit(c); break;
    case 'list': await renderList(c); break;
    case 'token': renderToken(c); break;
  }
}

async function renderDashboard(c){
  const r=await api('/api/dashboard');
  if(!r.success){c.innerHTML=`<div class="card"><p class="error-msg">${r.error}</p></div>`;return;}
  const d=r.data;
  c.innerHTML=`
  <div class="card"><div class="grid grid-4">
    <div class="stat"><div class="num">${d.total}</div><div class="label">总报销单</div></div>
    <div class="stat"><div class="num" style="color:#d97706">${d.pending}</div><div class="label">待审批</div></div>
    <div class="stat"><div class="num" style="color:#059669">${d.approved}</div><div class="label">已通过</div></div>
    <div class="stat"><div class="num" style="color:#e11d48">${d.rejected}</div><div class="label">已拒绝</div></div>
  </div></div>
  <div class="card"><div class="grid grid-2">
    <div class="stat"><div class="num" style="color:#059669">¥${d.totalAmountApproved.toFixed(2)}</div><div class="label">已审批金额</div></div>
    <div class="stat"><div class="num" style="color:#d97706">¥${d.totalAmountPending.toFixed(2)}</div><div class="label">待审批金额</div></div>
  </div></div>
  <div class="card"><h2>待审批明细</h2><p style="color:#5eead4;font-size:13px">AI提交: ${d.pendingAgent} | 人工提交: ${d.pendingHuman}</p></div>`;
}

function renderSubmit(c){
  c.innerHTML=`
  <div class="card">
    <h2>📝 提交报销</h2>
    <form id="submitForm">
      <label>上传发票（JPG/PNG/WebP/PDF，最多5张）</label>
      <input type="file" id="invoiceFiles" multiple accept=".jpg,.jpeg,.png,.webp,.pdf" style="padding:6px">
      <button type="button" class="btn btn-ghost btn-sm" id="ocrBtn" style="margin-top:8px">🔍 OCR 识别</button>
      <div id="ocrResult"></div>
      <label>金额 (CNY) <span style="color:#5eead4;font-size:11px">每月每人总额 ¥150，超目标记 ⚠️</span></label>
      <input type="number" id="amount" step="0.01" min="0.01" required placeholder="例如 88.50">
      <div class="grid grid-2">
        <div><label>日期</label><input type="date" id="invDate"></div>
        <div style="visibility:hidden"></div>
      </div>
      <label>描述</label>
      <textarea id="description" rows="2" placeholder="报销事由"></textarea>
      <div style="margin-top:16px;display:flex;gap:8px">
        <button type="submit" class="btn btn-primary">提交报销</button>
      </div>
      <div id="submitMsg" style="margin-top:8px"></div>
    </form>
  </div>`;

  const form=document.getElementById('submitForm');
  form.querySelector('#ocrBtn').addEventListener('click',async()=>{
    const files=document.getElementById('invoiceFiles').files;
    if(!files.length){alert('请先选择发票文件');return;}
    const fd=new FormData();
    for(const f of files)fd.append('invoices',f);
    document.getElementById('ocrResult').innerHTML='<p style="color:#5eead4">OCR 识别中...</p>';
    const r=await apiUpload('/api/ocr',fd);
    if(!r.success){document.getElementById('ocrResult').innerHTML=`<p class="error-msg">${r.error}</p>`;return;}
    const ocr=r.data[0]?.ocr;
    if(!ocr?.success){document.getElementById('ocrResult').innerHTML=`<p class="error-msg">${ocr?.error||'OCR 失败'}</p>`;return;}
    const e=ocr.data.extracted;
    const isForeign = ocr.data.isForeignCurrency;
    const amountCny = ocr.data.amountCny;
    const rate = ocr.data.exchangeRate;
    document.getElementById('amount').value = isForeign ? amountCny : (e.amount||0);
    if(e.date)document.getElementById('invDate').value=e.date;
    if(e.description)document.getElementById('description').value=e.description;
    document.getElementById('submitForm').dataset.ocrCurrency = e.currency || 'CNY';
    document.getElementById('submitForm').dataset.ocrOriginalAmount = e.amount || '';
    document.getElementById('submitForm').dataset.ocrExchangeRate = rate || '';
    document.getElementById('ocrResult').innerHTML=`
    <div class="ocr-result">
      <div class="field"><span>金额</span><span>${isForeign
        ? `<span style="color:#d97706">${e.currency} $${e.amount}</span> → <strong style="color:#059669">¥${amountCny}</strong> <span style="font-size:11px;color:#5eead4">(×${rate?.toFixed(4)})</span>`
        : `¥${e.amount||'-'}`}</span></div>
      <div class="field"><span>商户</span><span>${e.merchant||'-'}</span></div>
      <div class="field"><span>日期</span><span>${e.date||'-'}</span></div>
      <div class="field"><span>描述</span><span>${e.description||'-'}</span></div>
      <div class="field"><span>置信度</span><span>${((e.confidence||0)*100).toFixed(0)}%</span></div>
    </div>`;
  });

  form.addEventListener('submit',async(e)=>{
    e.preventDefault();
    const fd=new FormData();
    const files=document.getElementById('invoiceFiles').files;
    for(const f of files)fd.append('invoices',f);
    fd.append('amount',document.getElementById('amount').value);
    fd.append('description',document.getElementById('description').value);
    fd.append('category','general');
    const meta={
      date:document.getElementById('invDate').value,
      currency: form.dataset.ocrCurrency || 'CNY',
      originalAmount: form.dataset.ocrOriginalAmount || '',
      exchangeRate: form.dataset.ocrExchangeRate || '',
    };
    fd.append('metadata',JSON.stringify(meta));
    const r=await apiUpload('/api/reimbursements',fd);
    const msg=document.getElementById('submitMsg');
    if(r.success){msg.innerHTML=`<span style="color:#059669">✅ 提交成功！ID: ${r.data.id}</span>`;form.reset();}
    else msg.innerHTML=`<span class="error-msg">❌ ${r.error}</span>`;
  });
}

async function renderList(c){
  let allData=[];
  const r=await api('/api/reimbursements?limit=200');
  if(!r.success){c.innerHTML=`<div class="card"><p class="error-msg">${r.error}</p></div>`;return;}
  allData=r.data;
  if(!allData.length){c.innerHTML='<div class="card"><p style="color:#5eead4">暂无报销记录</p></div>';return;}
  c.innerHTML=`
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:8px;flex-wrap:wrap">
      <h2 style="margin:0">📋 报销列表</h2>
      <div style="display:flex;gap:6px">
        <input type="text" id="searchBox" placeholder="🔍 搜索..." style="width:160px;padding:6px 10px;font-size:12px">
        <select id="statusFilter" class="btn btn-ghost btn-sm" style="width:auto">
          <option value="">全部</option><option value="pending">待审批</option><option value="approved">已通过</option><option value="rejected">已拒绝</option>
        </select>
      </div>
    </div>
    <table>
      <thead><tr><th>ID</th><th>类型</th><th>金额</th><th>描述</th><th>提交人</th><th>附件</th><th>状态</th><th>时间</th><th>操作</th></tr></thead>
      <tbody id="listBody"></tbody>
    </table>
  </div>
  <div id="editModal" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);display:none;align-items:center;justify-content:center;z-index:100">
    <div class="card" style="width:360px;max-width:90vw">
      <h2>✏️ 编辑报销单</h2>
      <input type="hidden" id="editId">
      <div class="grid grid-2">
        <div><label>金额</label><input type="number" id="editAmount" step="0.01" min="0.01"></div>
        <div></div>
      </div>
      <label>描述</label><textarea id="editDescription" rows="2"></textarea>
      <label>日期</label><input type="date" id="editDate">
      <div style="margin-top:14px;display:flex;gap:6px;justify-content:flex-end">
        <button class="btn btn-ghost btn-sm" onclick="closeEdit()">取消</button>
        <button class="btn btn-primary btn-sm" onclick="saveEdit()">保存</button>
      </div>
      <div id="editMsg" style="margin-top:8px;font-size:12px"></div>
    </div>
  </div>`;

  function filterData(){
    const status=document.getElementById('statusFilter')?.value||'';
    const q=(document.getElementById('searchBox')?.value||'').toLowerCase();
    return allData.filter(r=>{
      if(status && r.status!==status) return false;
      if(q){ const txt=[r.description,r.submitterName,r.submitterId,r.id].join(' ').toLowerCase(); if(!txt.includes(q)) return false; }
      return true;
    });
  }

  function renderRows(){
    const data=filterData();
    document.getElementById('listBody').innerHTML=data.map(r=>{
      const forex=r.metadata?.originalCurrency && r.metadata?.originalCurrency!=='CNY';
      const amtHTML=forex
        ? `<span style="font-size:11px;color:#6d28d9">💱 ${r.metadata.originalCurrency} $${r.metadata.originalAmount}</span><br>¥${r.amount.toFixed(2)}<span style="font-size:10px;color:#5eead4">(×${Number(r.metadata.exchangeRate||1).toFixed(2)})</span>`
        : `¥${r.amount.toFixed(2)}`;
      const actions=[];
      const files=(r.attachments||[]);
      let attachHTML='-';
      if(files.length>0){
        attachHTML=files.map(f=>`<a href="${BASE + (f.fileUrl||'/api/files/'+f.filename)}" target="_blank" style="color:#0d9488;font-size:11px;text-decoration:none;font-weight:600" title="${f.originalName||f.filename}">📎</a>`).join(' ');
      }
      if(r.status==='pending'){
        actions.push(`<button class="btn btn-success btn-sm" onclick="approve('${r.id}')">✓</button>`);
        actions.push(`<button class="btn btn-danger btn-sm" onclick="reject('${r.id}')">✗</button>`);
        actions.push(`<button class="btn btn-ghost btn-sm" data-edit-id="${r.id}" data-edit-amount="${r.amount}" data-edit-desc="${encodeURIComponent(r.description||'')}" data-edit-date="${(r.metadata?.date||'').slice(0,10)}" onclick="openEditBtn(this)" title="编辑">✏️</button>`);
        actions.push(`<button class="btn btn-ghost btn-sm" onclick="delItem('${r.id}')" title="删除">🗑</button>`);
      }
      return `
    <tr class="${r.exceedsLimit?'exceed-row':''}" ${r.exceedsLimit?`title="${(r.exceedReasons||[]).join('; ')}"`:''}>
      <td style="font-family:monospace;font-size:11px">${r.id.slice(0,8)}</td>
      <td><span class="badge badge-agent">AI${forex?' <span class="badge badge-forex">💱外汇</span>':''}</span></td>
      <td>${amtHTML}${r.exceedsLimit?` <span class="badge badge-exceed" title="${(r.exceedReasons||[]).join('; ')}">⚠️ 超额 ¥${r.exceedAmount.toFixed(2)}</span>`:''}</td>
      <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.description}</td>
      <td>${r.submitterName}</td>
      <td style="font-size:12px">${attachHTML}</td>
      <td><span class="badge badge-${r.status}">${{pending:'待审批',approved:'已通过',rejected:'已拒绝'}[r.status]}</span></td>
      <td style="font-size:11px;color:#5eead4">${new Date(r.createdAt).toLocaleDateString('zh-CN')}</td>
      <td style="white-space:nowrap">${actions.join('')||'-'}</td>
    </tr>`}).join('');
  }

  renderRows();
  document.getElementById('statusFilter').addEventListener('change',renderRows);
  document.getElementById('searchBox').addEventListener('input',renderRows);
}

window.openEditBtn=(btn)=>{
  document.getElementById('editId').value=btn.dataset.editId;
  document.getElementById('editAmount').value=btn.dataset.editAmount;
  document.getElementById('editDescription').value=decodeURIComponent(btn.dataset.editDesc||'');
  document.getElementById('editDate').value=btn.dataset.editDate||'';
  document.getElementById('editMsg').innerHTML='';
  document.getElementById('editModal').style.display='flex';
};
window.closeEdit=()=>{document.getElementById('editModal').style.display='none'};
window.saveEdit=async()=>{
  const id=document.getElementById('editId').value;
  const body={amount:parseFloat(document.getElementById('editAmount').value),description:document.getElementById('editDescription').value,metadata:{date:document.getElementById('editDate').value}};
  const r=await api(`/api/reimbursements/${id}`,{method:'PATCH',body:JSON.stringify(body)});
  const msg=document.getElementById('editMsg');
  if(r.success){msg.innerHTML='<span style="color:#059669">✅ 已保存</span>';setTimeout(renderTab,500)}
  else msg.innerHTML=`<span class="error-msg">❌ ${r.error}</span>`;
};
window.delItem=async(id)=>{
  if(!confirm('确定删除？'))return;
  const r=await api(`/api/reimbursements/${id}`,{method:'DELETE'});
  if(r.success) renderTab(); else alert(r.error);
};
window.approve=async(id)=>{
  const r=await api(`/api/reimbursements/${id}/approve`,{method:'POST',body:JSON.stringify({comment:'OK'})});
  if(r.success)renderTab();else alert(r.error);
};
window.reject=async(id)=>{
  const reason=prompt('拒绝原因:');if(!reason)return;
  const r=await api(`/api/reimbursements/${id}/reject`,{method:'POST',body:JSON.stringify({reason})});
  if(r.success)renderTab();else alert(r.error);
};

function renderToken(c){
  c.innerHTML=`
  <div class="card">
    <h2>🔑 API Token</h2>
    <p style="color:#5eead4;font-size:13px;margin-bottom:12px">请求头：<code style="color:#0d9488">Authorization: Bearer &lt;token&gt;</code></p>
    <div class="token-box"><span id="tokenValue">${currentUser.apiToken||'加载中...'}</span><button class="btn btn-ghost btn-sm" onclick="copyToken()">📋</button></div>
    <div style="margin-top:12px"><button class="btn btn-danger btn-sm" onclick="resetToken()">🔄 重置</button></div>
    <div id="tokenMsg" style="margin-top:8px"></div>
  </div>
  <div class="card">
    <h2>📖 使用示例</h2>
    <pre style="background:#f0fdfa;padding:12px;border-radius:8px;overflow-x:auto;font-size:12px;line-height:1.7;border:1px solid #ccfbf1">
# 提交报销（智能体）
curl -X POST ${BASE}/api/reimbursements/agent \\
  -H "Authorization: Bearer &lt;token&gt;" \\
  -H "Content-Type: application/json" \\
  -d '{"amount":50,"description":"打车"}'

# 上传发票 OCR
curl -X POST ${BASE}/api/ocr \\
  -H "Authorization: Bearer &lt;token&gt;" \\
  -F "invoices=@invoice.pdf"

# 汇率查询
